name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux ${{ matrix.cc }} ${{ matrix.build }}${{ matrix.note }}
    runs-on: ${{ matrix.os }}
    # Harmless on non-sanitized cells; makes any ASan/UBSan finding a hard,
    # stack-traced failure on the sanitizer cell.
    env:
      ASAN_OPTIONS: halt_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, cc: gcc,   ver: 13, build: Debug }
          - { os: ubuntu-24.04, cc: gcc,   ver: 13, build: Release }
          - { os: ubuntu-24.04, cc: gcc,   ver: 14, build: Debug }
          - { os: ubuntu-24.04, cc: gcc,   ver: 14, build: Release, heavy: true }
          - { os: ubuntu-24.04, cc: clang, ver: 18, build: Debug }
          - { os: ubuntu-24.04, cc: clang, ver: 18, build: Release }
          - { os: ubuntu-22.04, cc: gcc,   ver: 12, build: Debug,   extra: "-DBOUND_CXX20=ON",      note: " (C++20)" }
          - { os: ubuntu-24.04, cc: gcc,   ver: 14, build: Release, extra: "-DBOUND_MATH_FIXED=ON", note: " (CORDIC)", heavy: true }
          - { os: ubuntu-24.04, cc: gcc,   ver: 14, build: Release, extra: "-DBOUND_MATH_FLOAT=ON", note: " (float)" }
          # AddressSanitizer + UBSan. The fast paths lean on hand-rolled 128-bit
          # intermediates, signed-overflow detection and bit-shifts — exactly the
          # UB UBSan catches. Debug + Clang for the sharpest diagnostics.
          - { os: ubuntu-24.04, cc: clang, ver: 18, build: Debug, extra: "-DBOUND_SANITIZE=ON", note: " (sanitizers)", san: true }
          # Native ARM64 (free for public repos): exercises a different ABI/codegen —
          # the Release cell runs the fuzz harness as a cross-arch bit-exactness check.
          - { os: ubuntu-24.04-arm, cc: gcc, ver: 14, build: Debug,   note: " (arm64)" }
          - { os: ubuntu-24.04-arm, cc: gcc, ver: 14, build: Release, note: " (arm64)", heavy: true }
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          if [ "${{ matrix.cc }}" = "gcc" ]; then
            sudo apt-get install -y g++-${{ matrix.ver }}
            echo "CC=gcc-${{ matrix.ver }}"  >> "$GITHUB_ENV"
            echo "CXX=g++-${{ matrix.ver }}" >> "$GITHUB_ENV"
          else
            sudo apt-get install -y clang-${{ matrix.ver }}
            echo "CC=clang-${{ matrix.ver }}"    >> "$GITHUB_ENV"
            echo "CXX=clang++-${{ matrix.ver }}" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build }} ${{ matrix.extra }}

      - name: Build
        run: cmake --build build -j

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure -LE example

      - name: Examples
        run: ctest --test-dir build --output-on-failure -L example

      - name: Single-header smokes
        run: cmake --build build --target single_header_smoke single_header_freestanding_smoke single_header_nofp_smoke

      # bound_fuzz and bench are large, slow-to-compile EXCLUDE_FROM_ALL targets,
      # so they are exercised only in Release on representative cells (one per
      # math engine) rather than across the whole matrix. bench is build-only —
      # a benchmark has no pass/fail; building it verifies it stays compilable.
      - name: Fuzz + bench (Release, representative cells)
        if: matrix.heavy
        run: |
          cmake --build build --target bound_fuzz bench -j
          ./build/bound_fuzz

      # Sanitized cell: run the property fuzzer under ASan+UBSan, but a short
      # fixed run (seed 1, 500 iters/property ≈ 90M checks, ~75s) — sanitizers
      # are ~2-10x, so the long sweep stays on the `heavy` cells above.
      - name: Fuzz (sanitizers, short)
        if: matrix.san
        timeout-minutes: 8
        run: |
          cmake --build build --target bound_fuzz -j
          ./build/bound_fuzz 1 500

      # Sanitized cell: actually RUN the freestanding smoke (the step above only
      # builds it). Under BOUND_SANITIZE this target picks up ASan+UBSan, so the
      # -fno-exceptions / BND_NO_STRING error path is exercised, not just compiled.
      - name: Freestanding smoke run (sanitizers)
        if: matrix.san
        run: ./build/single_header_freestanding_smoke

  coverage:
    name: linux gcc coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-14 lcov
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBOUND_COVERAGE=ON

      # Build everything first: the `coverage` target runs ctest, which includes
      # the example tests — those must exist or ctest reports them "Not Run".
      - name: Build
        run: cmake --build build -j

      - name: Coverage
        run: cmake --build build --target coverage

      - name: Summary
        run: lcov --summary build/coverage.info

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage/

  perf:
    name: linux gcc perf gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++-14 valgrind
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # codegen guard (call-free + vectorized fast paths) runs as a labelled
      # ctest; it also runs across the linux matrix above, but pinning it here
      # keeps the perf signals in one place.
      - name: Codegen guard
        run: ctest --test-dir build --output-on-failure -L perf

      # Cachegrind instruction-count gate, one run per workload key.
      # Deterministic, so stable on shared runners. If a key is absent from
      # tests/perf_baseline.json the script bootstraps it (writes + passes) and
      # uploads it below for review/commit; once committed, each key gates a
      # >5% instruction-count regression on its fast path.
      - name: Cachegrind gate
        timeout-minutes: 15
        run: |
          cmake --build build --target perf_workload -j
          for key in integer_qformat integer_mul qformat_div cross_grid_assign checked_add; do
            python3 tests/check_perf.py \
              --binary build/perf_workload \
              --baseline tests/perf_baseline.json \
              --key "$key" --tol 0.05
          done

      - name: Upload perf baseline
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: tests/perf_baseline.json

  clang-tidy:
    name: linux clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 clang-tidy-18 clang-tools-18

      # clang-tidy parses straight from compile_commands.json (no build step).
      # Configure with clang so the database carries clang-compatible flags.
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
                   -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++-18

      # WarningsAsErrors: '*' in .clang-tidy makes any enabled-check finding fail.
      # Header diagnostics are scoped to include/bound/ via HeaderFilterRegex.
      - name: clang-tidy
        timeout-minutes: 15
        run: run-clang-tidy-18 -p build -quiet
                   -header-filter '.*/include/bound/.*'
                   tests/*.cpp examples/*.cpp

  windows:
    name: windows msvc ${{ matrix.arch }} ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022,   arch: x64,   build: Debug }
          - { os: windows-2022,   arch: x64,   build: Release }
          # Native Windows ARM64 (free for public repos).
          - { os: windows-11-arm, arch: ARM64, build: Debug }
          - { os: windows-11-arm, arch: ARM64, build: Release }
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build }} -j

      - name: Unit tests
        run: ctest --test-dir build -C ${{ matrix.build }} --output-on-failure -LE example

      - name: Examples
        run: ctest --test-dir build -C ${{ matrix.build }} --output-on-failure -L example

      - name: Single-header smokes
        run: cmake --build build --config ${{ matrix.build }} --target single_header_smoke single_header_freestanding_smoke

  macos:
    name: macos appleclang ${{ matrix.build }}
    # macos-15 ships Xcode 16 / AppleClang 16 (≈ upstream Clang 17). AppleClang 15
    # (macos-14) can't parse the braced-init NTTP form `bound<{...}>`; Clang 16+ can.
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        build: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build }}

      - name: Build
        run: cmake --build build -j

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure -LE example

      - name: Examples
        run: ctest --test-dir build --output-on-failure -L example

      - name: Single-header smokes
        run: cmake --build build --target single_header_smoke single_header_freestanding_smoke
